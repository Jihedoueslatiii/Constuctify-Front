<!-- report-selector.component.html -->
<div class="report-selector-container">
    <mat-form-field appearance="outline">
      <mat-label>Select Report</mat-label>
      <mat-select (selectionChange)="selectReport($event.value)">
        <mat-option *ngFor="let report of reports" [value]="report">
          {{ report.title }} ({{ report.reportType }})
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>
