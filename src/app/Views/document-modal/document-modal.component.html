<div class="modal-overlay" *ngIf="documentUrl" (click)="closeModal($event)">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div *ngIf="documentType === 'JPG' || documentType === 'PNG' || documentType === 'GIF'">
      <img [src]="documentUrl" alt="Document Image" style="width: 100%; height: 100%; object-fit: contain;" />
    </div>
    <div *ngIf="documentType === 'PDF'">
      <iframe [src]="documentUrl" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>
    <div *ngIf="documentType === 'TXT'">
      <pre style="width: 100%; height: 100%; overflow: auto; margin: 0; padding: 16px; white-space: pre-wrap;">{{ document?.content }}</pre>
    </div>
    <div *ngIf="documentType === 'DOCX'">
      <p style="text-align: center; margin: 20px;">DOCX files cannot be previewed directly. Please download the file to view it.</p>
    </div>
  </div>
</div>
