<!-- Navbar -->
<!-- Navbar -->
<nav class="navbar">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <button class="toggle-btn" (click)="toggleSidebar()">☰</button>

 <!-- Navbar -->
<div class="nav-right">
  <!-- Barre de recherche -->
  <div class="search-box">
    <input type="text" [(ngModel)]="searchTerm" (input)="onSearchChange()" placeholder="Search..." />
    <button><i class="fas fa-search"></i></button>
  </div>


    <!-- Profil utilisateur avec menu déroulant -->
    <div class="user-profile" (click)="toggleProfileMenu()">
      <!-- Profil Utilisateur avec image circulaire et badge de statut -->
      <div class="user-info">
        <img src="assets/image/adam.png" alt="User Profile" class="user-img" />
        <div class="user-name-container">
          <span class="user-name" title="Nom complet de l'utilisateur">{{ loggedUser?.firstname }} {{ loggedUser?.lastname }}</span>
          <!-- Badge de statut (en ligne/hors ligne) -->
          <span class="status-badge" [class.online]="isOnline" title="Statut utilisateur"></span>
        </div>
      </div>
    </div>

    <!-- Menu déroulant (caché par défaut, affiché au clic) -->
    <div class="profile-menu" [class.show]="isProfileMenuVisible">
      <ul>
        <li (click)="logout()">Logout</li>
      </ul>
    </div>
  </div>
</nav>



<!-- Sidebar -->
<aside class="sidebar" [class.closed]="isSidebarClosed">
  <div class="logo-container">
    <img src="assets/image/logo.png" alt="Logo" class="logo-img" />
  </div>
  <ul class="menu">
    <li>
      <a 
        class="menu-item" 
        [routerLink]="'/project'" 
        routerLinkActive="active">
        <i class="fas fa-folder"></i> Project
      </a>
    </li>
    
    <li>
      <a 
        class="menu-item" 
        [routerLink]="'/tasks'" 
        routerLinkActive="active">
        <i class="fas fa-tasks"></i> Task
      </a>
    </li>
   
    <li>
      <a  class="menu-item" (click)="toggleSubMenu('resource')">
        <i class="fas fa-wrench"></i> Resource
      </a>
      <ul class="submenu" [class.open]="activeMenu === 'resource'">
        <li><a href="/AddRessource"><i class="fas fa-tools"></i> Add Resource</a></li>
        <li><a href="/ViewRessource"><i class="fas fa-scroll"></i> View Resources</a></li>
      </ul>
    </li>
    <li><a href="#"><i class="fas fa-dollar-sign"></i> Finance</a></li>
    <li><a routerLink="/users" ><i class="fas fa-users"></i>Users</a></li>
    <li>
      <a  class="menu-item" (click)="toggleSubMenu('team')">
        <i class="fas fa-building"></i> Teams
      </a>
      <ul class="submenu" [class.open]="activeMenu === 'team'">
        <li><a href="/add-team"><i class="fas fa-building"></i> Add Teams</a></li>
        <li><a href="/list-teams"><i class="fas fa-building"></i> View Teams</a></li>
        <li><a href="/list-employer"><i class="fas fa-building"></i>Employers</a></li>
      </ul>
    </li>
    <li><a routerLink="/logs" ><i class="fas fa-users"></i>Logs</a></li>
    <li><a href="#"><i class="fas fa-box"></i> Deliverable</a></li>
    <li><a href="#"><i class="fas fa-file-alt"></i> Documentation</a></li>
    <li><a href="/gemini"><i class="fas fa-file-alt"></i> Chatbot</a></li>
  </ul>
</aside>
