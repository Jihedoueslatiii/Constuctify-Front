<app-bar></app-bar>

<div class="container">
  <h2 class="title">Mettre à jour une Ressource</h2>

  <form (submit)="updateRessource()">
    <div class="form-group">
      <label for="nom">Nom de la ressource :</label>
      <input type="text" id="nom" [(ngModel)]="ressource.nomRessource" name="nomRessource" required>
    </div>

    <div class="form-group">
      <label for="nombre">Nombre :</label>
      <input type="number" id="nombre" [(ngModel)]="ressource.nombreRessource" name="nombreRessource" >
    </div>

    <div class="form-group">
      <label for="type">Type :</label>
      <input type="text" id="type" [(ngModel)]="ressource.typesRessource" name="typesRessource" required>
    </div>

    <div class="form-group">
      <label for="cost">Coût :</label>
      <input type="number" id="cost" [(ngModel)]="ressource.cost" name="cost" required min="1">
    </div>

    <button type="submit" class="btn submit">Mettre à jour</button>
  </form>
</div>
