<div class="container mt-5">
    <h2>Définir votre mot de passe</h2>
    <form (ngSubmit)="submitPassword()">
      <div class="mb-3">
        <label>Mot de passe</label>
        <input type="password" [(ngModel)]="password" name="password" class="form-control" required />
      </div>
      <div class="mb-3">
        <label>Confirmer le mot de passe</label>
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" class="form-control" required />
      </div>
      <button class="btn btn-primary" type="submit">Définir le mot de passe</button>
    </form>
  </div>
